version: "3.9"

services:
  db:
    image: postgres:15
    container_name: lemipay-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build: ./server
    container_name: lemipay-server
    depends_on:
      - db
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "${PORT_SERVER}:3000"

  client:
    build: ./client
    container_name: lemipay-client
    depends_on:
      - server
    ports:
      - "${PORT_CLIENT}:5173"

volumes:
  postgres_data: