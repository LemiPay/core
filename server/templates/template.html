<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>{{ email_title }}</title>
</head>
<body style="font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f8fafc; margin: 0; padding: 40px 20px;">

<table width="100%" border="0" cellspacing="0" cellpadding="0" style="max-width: 620px; margin: 0 auto; background-color: #ffffff; border-radius: 16px; border: 1px solid #e5e7eb; box-shadow: 0 10px 30px rgba(17, 24, 39, 0.08); overflow: hidden;">
  <tr>
    <td style="padding: 36px 40px; text-align: center; background-color: #111111;">
      <h1 style="color: #ffffff; margin: 0; font-size: 30px; font-weight: 700; letter-spacing: -0.5px;">LemiPay</h1>
      <p style="color: #d1d5db; font-size: 14px; margin: 8px 0 0 0;">Finanzas grupales simplificadas</p>
    </td>
  </tr>

  <tr>
    <td style="padding: 40px;">
      <h2 style="color: #111111; margin: 0 0 16px 0; font-size: 26px; line-height: 1.2; letter-spacing: -0.4px;">
        {{ heading }}
      </h2>
      <p style="color: #4b5563; font-size: 16px; line-height: 1.65; margin: 0 0 24px 0;">
        {{ intro_text }}
      </p>

      <table width="100%" border="0" cellspacing="0" cellpadding="0" style="background-color: #f9fafb; border-radius: 12px; border: 1px solid #e5e7eb; margin-bottom: 24px;">
        <tr>
          <td style="padding: 16px 20px;">
            <p style="margin: 0; color: #6b7280; font-size: 14px;">
              <strong style="color: #111111;">{{ detail_label }}:</strong>
              <span style="color: #111111; font-weight: 600;">{{ detail_value }}</span>
            </p>
          </td>
        </tr>
      </table>

      <p style="color: #6b7280; font-size: 14px; line-height: 1.65; margin: 0;">
        {{ closing_text }}
      </p>
    </td>
  </tr>

  <tr>
    <td style="padding: 22px 40px; text-align: center; background-color: #f9fafb; border-top: 1px solid #e5e7eb;">
      <p style="color: #9ca3af; font-size: 12px; margin: 0; line-height: 1.6;">
        Este es un mensaje automático de LemiPay. Si tienes dudas, responde este correo.<br>
        © 2026 LemiPay. Todos los derechos reservados.
      </p>
    </td>
  </tr>
</table>

</body>
</html>
