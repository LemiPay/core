[package]
name = "server"
version = "0.1.0"
edition = "2024"

[dependencies]
diesel = { version = "2.2.0", features = ["postgres", "uuid", "r2d2"] }
uuid = { version = "1.22.0", features = ["serde", "v4"] }
# build libpq and openssl as part of the build process
# uncomment these lines if you run into setup issues
# pq-sys = { version = "0.6", features = ["bundled"] }
# openssl-sys = { version = "0.9.100", features = ["vencdored"] }
dotenvy = "0.15"
axum = { version = "0.8.8", features = ["macros"] }
http = "1.4.0"
diesel_migrations = "2.3.1"
tracing-subscriber = "0.3.23"
serde = { version = "1.0.228", features = ["derive"] }
tokio = { version = "1.50", features = ["full"] }
deadpool-diesel = { version = "0.6.1", features = ["postgres"] }
serde_json = "1.0.149"
r2d2 = "0.8.10"
thiserror = "2.0.18"

