# =============================================================================
# Investment strategies catalog — LemiPay
# =============================================================================
#
# Edit this file to add/change strategies and baskets. Restart the server to apply
# (synced into Postgres on startup).
#
# Rules:
#   - allocation weights are in basis points (10000 = 100%). Must sum to 10000
#     for mark_to_market strategies. Omit / leave empty for simulated.
#   - Symbols must exist in config/coingecko_tickers.toml
#   - id (UUID) is optional but recommended so existing investments keep the same strategy
#   - valuation_mode: "mark_to_market" | "simulated"
#   - category: simulated | crypto | stocks | mixed | rwa
#   - risk_level: low | medium | high
#
# Path override (optional):
#   INVESTMENT_STRATEGIES_FILE=/path/to/investment_strategies.toml
# =============================================================================

