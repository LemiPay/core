# =============================================================================
# CoinGecko ticker map — LemiPay investments
# =============================================================================
#
# Sections = URL tag:
#   [coins]        → https://www.coingecko.com/en/coins/{page}
#   [stocks]       → https://www.coingecko.com/en/stocks/{page}
#   [commodities]  → https://www.coingecko.com/en/commodities/{page}
#
# Value forms:
#   TICKER = "slug"
#     → page = api = slug  (OK for pure coins)
#
#   TICKER = { page = "web-slug", api = "coin-api-id" }
#     → link uses page; /simple/price uses api
#     Use this for stocks/commodities: the website path ≠ the API coin id.
#
# Find API ids: https://api.coingecko.com/api/v3/search?query=nvidia
# (look under "coins" → id field for tokenized stocks)
#
# Restart server after edits.
# COINGECKO_TICKERS_FILE=/path/to/this.toml
# =============================================================================

[coins]
BTC = "bitcoin"
ETH = "ethereum"
SOL = "solana"
DOGE = "dogecoin"

# Stocks: page = /en/stocks/{page}  |  api = CoinGecko coin id for /simple/price
[stocks]
AAPL = { page = "apple", api = "apple-ondo-tokenized-stock" }
MSFT = { page = "microsoft", api = "microsoft-ondo-tokenized-stock" }
NVDA = { page = "nvidia", api = "nvidia-ondo-tokenized-stock" }
GOOGL = { page = "alphabet", api = "alphabet-class-a-ondo-tokenized-stock" }
SPCX = { page = "spacex", api = "spacex-bstocks-tokenized-stock" }

[commodities]
# page for /en/commodities/gold ; api = tradeable gold token on CoinGecko
GOLD = { page = "gold", api = "pax-gold" }
