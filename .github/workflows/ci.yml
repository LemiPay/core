name: CI

on:
  push:
  pull_request:

jobs:
  # 🦀 RUST CHECKS
  rust:
    name: 🦀 Rust Checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 🔍 Check formatting
        run: cargo fmt --all -- --check

      - name: 🧠 Cargo check
        run: cargo check --all-targets --all-features
      
      - name: 🧪 Run tests
        run: cargo test --all

  # 🟢 SVELTE CHECKS
  client:
    name: 🟢 Svelte Checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 📦 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 📥 Install deps
        run: pnpm install --frozen-lockfile

      - name: 🔍 Lint
        run: pnpm run lint

      - name: 🧠 Type check
        run: pnpm run check