name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: client
        run: bun install --frozen-lockfile

      - name: Build
        working-directory: client
        run: bun run build
        env:
          PUBLIC_API_URL: ${{ secrets.PUBLIC_API_URL }}
          PUBLIC_VAULT_CONTRACT_ADDRESS: ${{ secrets.PUBLIC_VAULT_CONTRACT_ADDRESS }}
          VITE_PUBLIC_REOWN_KEY: ${{ secrets.VITE_PUBLIC_REOWN_KEY }}
          VITE_PUBLIC_RPC_URL: ${{ secrets.VITE_PUBLIC_RPC_URL }}

      - name: Verify build
        working-directory: client
        run: |
          echo "===== BUILD ROOT ====="
          find build -maxdepth 2 -type f | sort
          echo
          echo "===== STATIC (frontend) ====="
          ls -lah build/static
          echo
          head -20 build/static/index.html
          echo
          echo "===== SERVER (SSR function) ====="
          ls -lah build/server
          echo
          echo "===== SWA CONFIG ====="
          ls -lah build/staticwebapp.config.json || echo "⚠️  No se generó staticwebapp.config.json"

      - name: Deploy
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_AGREEABLE_BEACH_095F29C0F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          # MUY IMPORTANTE: app_location apunta a la carpeta ya buildeada.
          # output_location y api_location son relativos a app_location.
          app_location: client/build
          output_location: static
          api_location: server
          # skip_app_build: Bun ya buildeó el frontend arriba, Oryx no debe tocarlo.
          # No seteamos skip_api_build: Oryx instala las deps de la función SSR
          # (build/server) con npm — eso es Node puro, no depende de Bun.
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_AGREEABLE_BEACH_095F29C0F }}
          action: close